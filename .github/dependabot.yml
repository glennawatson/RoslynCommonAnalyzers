# Dependabot version updates.
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Group order matters — Dependabot assigns each package to the first group
# whose patterns match, so narrower groups (roslyn, analyzers, test-stack)
# come before the catch-all microsoft group.

version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    ignore:
      # The Roslyn compiler API the analyzers are *built against* must stay on
      # the 4.14.x line so the produced assemblies keep loading in Visual
      # Studio 2022 17.14 / the SDK that ships it. Block the 5.x major.
      # (Microsoft.CodeAnalysis.Analyzers — the RS* dev-time analyzer for our
      # own source — is intentionally NOT listed here; it tracks latest.)
      - dependency-name: "Microsoft.CodeAnalysis"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.Common"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.CSharp"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.CSharp.Workspaces"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.Workspaces.Common"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.VisualBasic"
        versions: [">=5.0.0"]
      - dependency-name: "Microsoft.CodeAnalysis.VisualBasic.Workspaces"
        versions: [">=5.0.0"]
    groups:
      roslyn:
        # The Roslyn compiler API + the analyzer-testing harness — versioned
        # together with the targeted VS/Roslyn release (held at 4.14.x via the
        # ignore rules above). Microsoft.CodeAnalysis.Analyzers is excluded so
        # it can move independently with the other source-quality analyzers.
        patterns:
          - "Microsoft.CodeAnalysis"
          - "Microsoft.CodeAnalysis.*"
        exclude-patterns:
          - "Microsoft.CodeAnalysis.Analyzers"
      analyzers:
        # Build-time source-quality analyzers — track latest.
        patterns:
          - "Microsoft.CodeAnalysis.Analyzers"
          - "*.Analyzers"
          - "StyleCop.Analyzers"
          - "Roslynator.*"
          - "SonarAnalyzer.*"
      versioning:
        patterns:
          - "MinVer"
      test-stack:
        patterns:
          - "TUnit*"
          - "NSubstitute"
          - "Microsoft.Testing.*"
      microsoft:
        # Catch-all for the rest of the Microsoft / System out-of-band packages.
        patterns:
          - "Microsoft.*"
          - "System.*"
        exclude-patterns:
          - "Microsoft.CodeAnalysis.*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 20
    groups:
      core-actions:
        patterns:
          - "actions/*"
          - "dotnet/*"
          - "github/*"
      release-actions:
        # Release-only vendor actions land together so signing / publishing
        # workflow changes stay in one PR.
        patterns:
          - "SSLcom/*"
          - "NuGet/*"
