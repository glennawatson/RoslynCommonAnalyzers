name: CI Build

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions:
    contents: read

env:
    DOTNET_NOLOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
    build:
        strategy:
            fail-fast: false
            matrix:
                os: [ windows-latest, ubuntu-latest, macos-latest ]
        runs-on: ${{ matrix.os }}
        env:
            # MinVer is tag-first; on CI commits past the latest tag it would otherwise
            # walk git per project. Pin a deterministic CI version so every project
            # stamps the same value without the walk.
            MINVERVERSIONOVERRIDE: 0.0.0-ci.0+${{ github.sha }}
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0
                    fetch-tags: true

            -   name: Setup .NET
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: |
                        8.0.x
                        10.0.x

            -   name: Restore
                run: dotnet restore Blazor.Common.Analyzers.sln

            -   name: Build
                run: dotnet build Blazor.Common.Analyzers.sln --no-restore --configuration Release

            -   name: Test
                run: dotnet test --solution Blazor.Common.Analyzers.sln --no-build --configuration Release
