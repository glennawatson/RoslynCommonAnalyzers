name: Release

on:
    workflow_dispatch:
        inputs:
            bump:
                description: "Auto-increment level for the new tag. You must pick one."
                required: true
                type: choice
                options:
                    - "(pick one)"
                    - major
                    - minor
                    - patch

permissions:
    contents: write
    id-token: write

env:
    DOTNET_NOLOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
    release:
        runs-on: ubuntu-latest
        environment:
            name: release
        permissions:
            contents: write
            id-token: write
        steps:
            -   name: Checkout
                uses: actions/checkout@v6
                with:
                    fetch-depth: 0
                    fetch-tags: true

            -   name: Setup .NET
                uses: actions/setup-dotnet@v5
                with:
                    dotnet-version: |
                        8.0.x
                        10.0.x

            -   name: Compute next version + create tag
                id: ver
                env:
                    BUMP: ${{ inputs.bump }}
                run: |
                    # MinVer is tag-first and won't compute a clean RTM version when the
                    # working commit is past the latest tag (it appends pre-release +
                    # height by design). So compute the bump in shell from the latest
                    # RTM tag, tag HEAD, push — then propagate the version through
                    # MINVERVERSIONOVERRIDE so every downstream MSBuild project skips
                    # MinVer's per-project git walk and stamps this exact value.
                    # Tags use no prefix (e.g. 1.0.29), matching MinVer's default
                    # MinVerTagPrefix and the project's existing tag history.
                    case "$BUMP" in
                      major|minor|patch) ;;
                      *) echo "Pick a bump level (major / minor / patch)." >&2; exit 1 ;;
                    esac
                    LAST="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' \
                            | grep -Ev -- '-' \
                            | sort -V \
                            | tail -1)"
                    if [ -z "$LAST" ]; then
                      echo "No RTM tag (X.Y.Z) found in history." >&2
                      exit 1
                    fi
                    IFS=. read -r MAJ MIN PAT <<<"$LAST"
                    case "$BUMP" in
                      major) VERSION="$((MAJ+1)).0.0" ;;
                      minor) VERSION="${MAJ}.$((MIN+1)).0" ;;
                      patch) VERSION="${MAJ}.${MIN}.$((PAT+1))" ;;
                    esac
                    echo "Latest RTM tag: $LAST -> next: $VERSION"
                    echo "version=$VERSION" >> "$GITHUB_OUTPUT"
                    echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
                    echo "MINVERVERSIONOVERRIDE=$VERSION" >> "$GITHUB_ENV"
                    git config user.name 'github-actions[bot]'
                    git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
                    git tag "$VERSION"
                    git push origin "$VERSION"

            -   name: Restore
                run: dotnet restore Blazor.Common.Analyzers.sln

            -   name: Build
                run: dotnet build Blazor.Common.Analyzers.sln --no-restore --configuration Release

            -   name: Pack
                run: dotnet pack Blazor.Common.Analyzers.sln --no-build --configuration Release -o packages

            -   name: Sign packages with SSL.com eSigner
                uses: SSLcom/esigner-codesign@cf5f6c1d38ad10f47e3ed9aca873f429b1a8d85b # v1.3.2
                with:
                    command: batch_sign
                    username: ${{ secrets.ES_USERNAME }}
                    password: ${{ secrets.ES_PASSWORD }}
                    credential_id: ${{ secrets.CREDENTIAL_ID }}
                    totp_secret: ${{ secrets.ES_TOTP_SECRET }}
                    dir_path: ./packages
                    output_path: ./signed
                    malware_block: true
                    jvm_max_memory: 2048M

            -   name: Upload signed packages
                uses: actions/upload-artifact@v7
                with:
                    name: signed-nuget
                    path: ./signed/*.nupkg
                    if-no-files-found: error

            -   name: NuGet login (OIDC trusted publishing)
                uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
                id: nuget-login
                with:
                    user: ${{ secrets.NUGET_USER }}

            -   name: Push to NuGet
                env:
                    NUGET_API_KEY: ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
                run: |
                    for pkg in ./signed/*.nupkg; do
                      dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key "$NUGET_API_KEY"
                    done

            -   name: Install GitReleaseNoteGenerator
                run: dotnet tool install -g GitReleaseNoteGenerator

            -   name: Generate release notes
                env:
                    GITHUB_TOKEN: ${{ github.token }}
                    RELEASE_VERSION: ${{ steps.ver.outputs.version }}
                run: git-release-notes --release-version "$RELEASE_VERSION" --output-file release-notes.md

            -   name: Create GitHub Release
                env:
                    GH_TOKEN: ${{ github.token }}
                    RELEASE_TAG: ${{ steps.ver.outputs.tag }}
                    RELEASE_VERSION: ${{ steps.ver.outputs.version }}
                run: gh release create "$RELEASE_TAG" --repo "${{ github.repository }}" --title "$RELEASE_VERSION" --notes-file release-notes.md ./signed/*.nupkg
