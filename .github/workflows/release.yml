name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Auto-increment level for the new tag. You must pick one."
        required: true
        type: choice
        options:
          - "(pick one)"
          - major
          - minor
          - patch

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          fetch-tags: true
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Compute next version + create tag
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          case "$BUMP" in
            major|minor|patch) ;;
            *) echo "Pick a bump level (major / minor / patch)." >&2; exit 1 ;;
          esac
          LAST="$(git tag --list '[0-9]*.[0-9]*.[0-9]*' | grep -Ev -- '-' | sort -V | tail -1)"
          if [ -z "$LAST" ]; then echo "No RTM tag (X.Y.Z) found." >&2; exit 1; fi
          IFS=. read -r MAJ MIN PAT <<<"$LAST"
          case "$BUMP" in
            major) VERSION="$((MAJ+1)).0.0" ;;
            minor) VERSION="${MAJ}.$((MIN+1)).0" ;;
            patch) VERSION="${MAJ}.${MIN}.$((PAT+1))" ;;
          esac
          echo "Latest RTM tag: $LAST -> next: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$VERSION" >> "$GITHUB_OUTPUT"
          echo "MINVERVERSIONOVERRIDE=$VERSION" >> "$GITHUB_ENV"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "$VERSION"
          git push origin "$VERSION"

      - name: Restore
        working-directory: src
        run: dotnet restore RoslynCommonAnalyzers.slnx

      - name: Build
        working-directory: src
        run: dotnet build RoslynCommonAnalyzers.slnx --no-restore --configuration Release

      - name: Pack
        working-directory: src
        run: dotnet pack RoslynCommonAnalyzers.slnx --no-build --configuration Release -o packages

      - name: Install GitReleaseNoteGenerator
        run: dotnet tool install -g GitReleaseNoteGenerator

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
          RELEASE_VERSION: ${{ steps.ver.outputs.version }}
        run: git-release-notes --release-version "$RELEASE_VERSION" --output-file release-notes.md

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-nuget
          path: src/packages/*.nupkg
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  sign:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v8
        with:
          name: unsigned-nuget
          path: signed

      - name: Resolve prebuilt SimplySign paths
        shell: bash
        run: |
          set -euxo pipefail
          # The prebuilt image bakes SimplySign at $SS_DIST and jsign at $JSIGN_JAR.
          : "${SS_DIST:?prebuilt image must set SS_DIST}"
          {
            echo "SS_DIST=$SS_DIST"
            echo "SS_START=$(find "$SS_DIST/" -name 'SimplySignDesktop_start' -type f | head -1)"
            echo "SS_EXE=$(find "$SS_DIST/" -name 'SimplySignDesktop' -type f | head -1)"
            echo "SS_PKCS11=$(find "$SS_DIST/" -name 'SimplySignPKCS*.so' | head -1)"
          } >> "$GITHUB_ENV"

      - name: Start headless display
        shell: bash
        run: |
          set -euxo pipefail
          Xvfb :99 -screen 0 1280x1024x24 >"$RUNNER_TEMP/xvfb.log" 2>&1 &
          sleep 3
          # Stop fluxbox running fbsetbg (a missing wallpaper pops an xmessage that
          # steals focus from the login form).
          mkdir -p "$HOME/.fluxbox"
          printf 'session.screen0.rootCommand: /bin/true\n' > "$HOME/.fluxbox/init"
          DISPLAY=:99 fluxbox >"$RUNNER_TEMP/fluxbox.log" 2>&1 &
          sleep 2
          DISPLAY=:99 xdpyinfo >/dev/null && echo "X display :99 up"

      - name: Connect SimplySign (headless login)
        shell: bash
        env:
          DISPLAY: ':99'
        run: |
          set -uxo pipefail
          : "${CERTUM_USER_ID:?map the CERTUM_USER_ID secret into the job env}"
          : "${CERTUM_OTP_URI:?map the CERTUM_OTP_URI secret into the job env}"
          # SimplySignDesktop reads $USER at startup and segfaults when unset.
          export USER="${USER:-root}"
          cp "$SS_DIST/SimplySignDesktop.xml" "$HOME/" 2>/dev/null || true
          mkdir -p "$HOME/.config"
          { echo "[General]"; echo "CacheUserIdAtLogon=Yes"; echo "ShowLogonDialogAfterApplicationStartup=Yes"; echo "ShowLogonDialogWhenAnyAppRequestsAccess=Yes"; } > "$HOME/.config/Unknown Organization.conf"
          export LD_LIBRARY_PATH="$SS_DIST:${LD_LIBRARY_PATH:-}"
          if [ -n "${SS_START:-}" ]; then "$SS_START" >"$RUNNER_TEMP/simplysign.log" 2>&1 &
          else "$SS_EXE" >"$RUNNER_TEMP/simplysign.log" 2>&1 & fi
          sleep 20
          # Current TOTP from the otpauth:// URI (honours algorithm/digits/period).
          OTP="$(python3 -c 'import os,hmac,hashlib,base64,struct,time;from urllib.parse import urlparse,parse_qs;q=parse_qs(urlparse(os.environ["CERTUM_OTP_URI"]).query);s=q["secret"][0];digits=int(q.get("digits",["6"])[0]);period=int(q.get("period",["30"])[0]);algo={"SHA1":hashlib.sha1,"SHA256":hashlib.sha256,"SHA512":hashlib.sha512}[q.get("algorithm",["SHA1"])[0].upper()];key=base64.b32decode(s+"="*((8-len(s)%8)%8));h=hmac.new(key,struct.pack(">Q",int(time.time()//period)),algo).digest();o=h[-1]&0xF;print(str((int.from_bytes(h[o:o+4],"big")&0x7fffffff)%(10**digits)).zfill(digits))')"
          echo "::add-mask::$OTP"
          # Find the login window, retry-waiting because the dialog can lag launch.
          WID=""; BX=0; BY=0; BW=0; BH=0
          for attempt in $(seq 1 30); do
            best=0; WID=""
            for w in $(xdotool search --name '' 2>/dev/null); do
              nm="$(xdotool getwindowname "$w" 2>/dev/null || true)"
              case "$nm" in *implySign*) ;; *) continue ;; esac
              eval "$(xdotool getwindowgeometry --shell "$w" 2>/dev/null)"
              area=$(( ${WIDTH:-0} * ${HEIGHT:-0} ))
              if [ "$area" -gt "$best" ]; then best=$area; WID=$w; BX=${X:-0}; BY=${Y:-0}; BW=${WIDTH:-0}; BH=${HEIGHT:-0}; fi
            done
            [ "${BW:-0}" -ge 400 ] && [ "${BH:-0}" -ge 300 ] && { echo "login window $WID ${BW}x${BH} (attempt $attempt)"; break; }
            WID=""; sleep 2
          done
          [ -z "$WID" ] && { echo "::error::SimplySign login window did not appear"; cat "$RUNNER_TEMP/simplysign.log" || true; exit 1; }
          xdotool windowactivate --sync "$WID" || xdotool windowactivate "$WID" || true
          xdotool windowraise "$WID" || true
          sleep 1
          # Click E-MAIL field, type id; Tab; type OTP; click Login.
          xdotool mousemove $((BX + BW/2)) $((BY + BH*39/100)) click 1; sleep 1
          xdotool type --clearmodifiers --delay 50 "$CERTUM_USER_ID"
          xdotool key Tab; sleep 1
          xdotool type --clearmodifiers --delay 50 "$OTP"
          xdotool mousemove $((BX + BW/2)) $((BY + BH*76/100)) click 1
          sleep 8
          # "Logon successful" dialog: token activates only after its Close button.
          best=0
          for w in $(xdotool search --name '' 2>/dev/null); do
            nm="$(xdotool getwindowname "$w" 2>/dev/null || true)"
            case "$nm" in *implySign*) ;; *) continue ;; esac
            eval "$(xdotool getwindowgeometry --shell "$w" 2>/dev/null)"
            area=$(( ${WIDTH:-0} * ${HEIGHT:-0} ))
            if [ "$area" -gt "$best" ]; then best=$area; WID=$w; BX=${X:-0}; BY=${Y:-0}; BW=${WIDTH:-0}; BH=${HEIGHT:-0}; fi
          done
          xdotool windowactivate --sync "$WID" || true
          xdotool mousemove $((BX + BW/2)) $((BY + BH*94/100)) click 1
          sleep 3
          # Confirm the token is active (fails fast if login did not take).
          timeout 60 pkcs11-tool --module "$SS_PKCS11" -L

      - name: Sign packages with jsign + verify
        shell: bash
        run: |
          set -euxo pipefail
          JAR="${JSIGN_JAR:-$RUNNER_TEMP/jsign.jar}"
          if [ ! -s "$JAR" ]; then
            curl -fsSL -o "$JAR" "https://repo1.maven.org/maven2/net/jsign/jsign/7.4/jsign-7.4.jar"
          fi
          CONF="$RUNNER_TEMP/sunpkcs11.conf"
          { echo "name = SimplySign"; echo "library = $SS_PKCS11"; echo "slotListIndex = 0"; } > "$CONF"
          shopt -s nullglob
          pkgs=( signed/*.nupkg )
          [ "${#pkgs[@]}" -gt 0 ] || { echo "::error::no packages matched: signed/*.nupkg"; exit 1; }
          for pkg in "${pkgs[@]}"; do
            echo "::group::sign $pkg"
            # RFC3161 timestamp so the signature outlives the cert; the token has
            # one key so jsign auto-selects it.
            java -jar "$JAR" --storetype PKCS11 --keystore "$CONF" --storepass "" \
              --alg SHA-256 --tsmode RFC3161 --tsaurl "http://time.certum.pl" --replace "$pkg"
            dotnet nuget verify "$pkg" --all --verbosity detailed
            echo "::endgroup::"
          done

      - name: Upload signed packages
        uses: actions/upload-artifact@v7
        with:
          name: signed-nuget
          path: signed/*.nupkg
          if-no-files-found: error

  publish:
    needs: [build, sign]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Download signed packages
        uses: actions/download-artifact@v8
        with:
          name: signed-nuget
          path: signed

      - name: Download release notes
        uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: .

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          for pkg in ./signed/*.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ needs.build.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.version }}" --notes-file release-notes.md
