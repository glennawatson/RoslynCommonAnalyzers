name: SonarCloud

on:
    push:
        branches: [ main ]
    pull_request:
        branches: [ main ]

permissions:
    contents: read

env:
    DOTNET_NOLOGO: true
    DOTNET_CLI_TELEMETRY_OPTOUT: true
    DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
    MINVERVERSIONOVERRIDE: 0.0.0-sonar.0+${{ github.sha }}

jobs:
    analyze:
        name: Build, test, and analyze
        runs-on: ubuntu-latest
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

        steps:
            -   name: Checkout
                uses: actions/checkout@v7
                with:
                    fetch-depth: 0
                    fetch-tags: true

            -   name: Set up JDK 21
                uses: actions/setup-java@v5
                with:
                    java-version: '21'
                    distribution: temurin

            -   name: Setup .NET
                uses: actions/setup-dotnet@v6
                with:
                    dotnet-version: |
                        8.0.x
                        10.0.x

            -   name: Cache SonarCloud packages
                uses: actions/cache@v6
                with:
                    path: ~/.sonar/cache
                    key: ${{ runner.os }}-sonar
                    restore-keys: ${{ runner.os }}-sonar

            -   name: Cache SonarScanner
                id: cache-sonar-scanner
                uses: actions/cache@v6
                with:
                    path: ${{ runner.temp }}/sonar-scanner
                    key: ${{ runner.os }}-sonar-scanner
                    restore-keys: ${{ runner.os }}-sonar-scanner

            -   name: Install SonarScanner
                if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
                run: |
                    mkdir -p "${{ runner.temp }}/sonar-scanner"
                    dotnet tool update dotnet-sonarscanner --tool-path "${{ runner.temp }}/sonar-scanner"

            -   name: Restore
                working-directory: src
                run: dotnet restore RoslynCommonAnalyzers.slnx

            -   name: Begin Sonar analysis
                working-directory: src
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: |
                    "${{ runner.temp }}/sonar-scanner/dotnet-sonarscanner" begin \
                      /k:"glennawatson_RoslynCommonAnalyzers" \
                      /o:"glennawatson" \
                      /d:sonar.token="${SONAR_TOKEN}" \
                      /d:sonar.host.url="https://sonarcloud.io" \
                      /d:sonar.scanner.skipJreProvisioning=true \
                      /d:sonar.cs.vscoveragexml.reportsPaths="**/TestResults/**/sonar-coverage.xml" \
                      /d:sonar.exclusions="**/tests/**,**/benchmarks/**" \
                      /d:sonar.coverage.exclusions="**/tests/**,**/benchmarks/**" \
                      /d:sonar.cpd.exclusions="**/tests/**,**/benchmarks/**" \
                      /d:sonar.test.exclusions="**/tests/**,**/benchmarks/**"

            -   name: Build
                working-directory: src
                run: dotnet build RoslynCommonAnalyzers.slnx --no-restore --configuration Release

            # Run each package's tests into its own results directory. A single
            # --solution run points every project at the same --coverage-output file,
            # so the slower report overwrites the other and one package lands at 0%
            # in the coverage import. Distinct results directories keep both reports;
            # the shared sonar-coverage.xml name still matches the import glob below.
            -   name: Test StyleSharp with MTP coverage
                working-directory: src
                run: dotnet test --project tests/StyleSharp.Analyzers.Tests/StyleSharp.Analyzers.Tests.csproj --configuration Release --no-restore -- --coverage --coverage-output-format xml --results-directory TestResults/StyleSharp --coverage-output sonar-coverage.xml

            -   name: Test PerformanceSharp with MTP coverage
                working-directory: src
                run: dotnet test --project tests/PerformanceSharp.Analyzers.Tests/PerformanceSharp.Analyzers.Tests.csproj --configuration Release --no-restore -- --coverage --coverage-output-format xml --results-directory TestResults/PerformanceSharp --coverage-output sonar-coverage.xml

            -   name: Test SecuritySharp with MTP coverage
                working-directory: src
                run: dotnet test --project tests/SecuritySharp.Analyzers.Tests/SecuritySharp.Analyzers.Tests.csproj --configuration Release --no-restore -- --coverage --coverage-output-format xml --results-directory TestResults/SecuritySharp --coverage-output sonar-coverage.xml

            -   name: End Sonar analysis
                working-directory: src
                env:
                    SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
                run: |
                    "${{ runner.temp }}/sonar-scanner/dotnet-sonarscanner" end \
                      /d:sonar.token="${SONAR_TOKEN}"
